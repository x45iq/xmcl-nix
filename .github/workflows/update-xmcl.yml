name: Update XMCL

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-xmcl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Get latest release version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/Voxelum/x-minecraft-launcher/releases/latest)
          TAG_NAME=$(echo "$RESPONSE" | jq -r .tag_name)
          if [ "$TAG_NAME" = "null" ] || [ -z "$TAG_NAME" ]; then
            echo "❌ Failed to get latest tag_name from GitHub API"
            exit 1
          fi
          LATEST="${TAG_NAME#v}"
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current
        run: |
          set -euo pipefail
          CURRENT=$(grep -oP 'version = "\K[0-9\.]+' package.nix)
          if [ -z "$CURRENT" ]; then
            echo "❌ Could not extract current version from package.nix"
            exit 1
          fi
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.latest.outputs.latest_version }}" = "${{ steps.current.outputs.current_version }}" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Update package.nix
        if: steps.compare.outputs.up_to_date == 'false'
        env:
          LATEST: ${{ steps.latest.outputs.latest_version }}
        run: |
          set -euo pipefail

          echo "🔄 Updating XMCL to version $LATEST"

          fetch_sha() {
            local arch=$1
            local url
            if [ "$arch" = "amd64" ]; then
              url="https://github.com/Voxelum/x-minecraft-launcher/releases/download/v${LATEST}/app-${LATEST}-linux.asar.sha256"
            elif [ "$arch" = "arm64" ]; then
              url="https://github.com/Voxelum/x-minecraft-launcher/releases/download/v${LATEST}/app-${LATEST}-linux-arm64.asar.sha256"
            else
              echo "❌ Unsupported architecture: $arch" >&2
              exit 1
            fi
            echo "⬇️  Fetching SHA256 for $arch from $url" >&2
            SHA=$(curl -fsSL "$url" | awk '{print $1}')
            if [ -z "$SHA" ]; then
              echo "❌ Failed to fetch SHA256 for $arch" >&2
              exit 1
            fi
            echo "$SHA"
          }

          SHA_X86_64=$(fetch_sha "amd64")   
          SHA_ARM64=$(fetch_sha "arm64")

          sed -i "s/version = \".*\";/version = \"${LATEST}\";/" package.nix
          sed -i '/x86_64-linux = {/,/};/ s|sha256 = "sha256:[^"]*"|sha256 = "sha256:'"$SHA_X86_64"'"|' package.nix
          sed -i '/aarch64-linux = {/,/};/ s|sha256 = "sha256:[^"]*"|sha256 = "sha256:'"$SHA_ARM64"'"|' package.nix

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix
          git commit -m "Update XMCL to version ${LATEST}"
          git push origin HEAD

      - name: No update needed
        if: steps.compare.outputs.up_to_date == 'true'
        run: echo "✅ XMCL is already up-to-date."
